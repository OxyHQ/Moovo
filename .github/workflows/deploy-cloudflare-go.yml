name: Deploy Moovo Go

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy-cloudflare-go.yml'
      - 'packages/courier-app/**'
      - 'package.json'
      - 'bun.lock'

jobs:
  deploy-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'
      - run: bun install --frozen-lockfile
      - name: Build app (Expo web export)
        run: bun run build:courier
        timeout-minutes: 60
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
          NODE_ENV: production
          # Public, compile-time Expo env. EXPO_PUBLIC_OXY_CLIENT_ID is the
          # registered Oxy RP client id (handoff: register it and set this repo
          # variable before the SSO RP flow works); the API URL points at the
          # Moovo backend.
          EXPO_PUBLIC_OXY_CLIENT_ID: ${{ vars.EXPO_PUBLIC_OXY_CLIENT_ID }}
          EXPO_PUBLIC_OXY_API_URL: ${{ vars.EXPO_PUBLIC_OXY_API_URL || 'https://api.oxy.so' }}
          EXPO_PUBLIC_API_URL: ${{ vars.EXPO_PUBLIC_API_URL || 'https://api.moovo.now' }}
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '3.114.0'
          command: pages deploy packages/courier-app/dist --project-name=moovo-go --branch=main
